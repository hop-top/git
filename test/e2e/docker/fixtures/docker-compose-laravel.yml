version: '3.8'
services:
  web:
    image: nginx:alpine
    ports:
      - "${HOP_PORT_WEB}:80"
    volumes:
      - "${HOP_VOLUME_APP_CODE}:/var/www/html"
      - "${HOP_VOLUME_APP_CODE}/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  app:
    image: php:8.3-fpm-alpine
    working_dir: /var/www/html
    volumes:
      - "${HOP_VOLUME_APP_CODE}:/var/www/html"
    environment:
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=cache
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s

  worker:
    image: php:8.3-cli-alpine
    working_dir: /var/www/html
    command: sh -c "apk add --no-cache php83-redis && php artisan queue:work --tries=3 --timeout=30"
    volumes:
      - "${HOP_VOLUME_APP_CODE}:/var/www/html"
    environment:
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=cache
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=secret
    ports:
      - "${HOP_PORT_DB}:3306"
    volumes:
      - "${HOP_VOLUME_DB_DATA}:/var/lib/mysql"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 10s

  cache:
    image: redis:7-alpine
    ports:
      - "${HOP_PORT_CACHE}:6379"
    volumes:
      - "${HOP_VOLUME_CACHE_DATA}:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

volumes:
  app_code:
  db_data:
  cache_data:
